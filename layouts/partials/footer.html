<script>        
    $(document).ready(function(){
        setTimeout(function () {
            if ($('a.smooth[href="' + window.location.hash + '"]')[0]) {
                $('a.smooth[href="' + window.location.hash + '"]').click();
            }else if (window.location.hash != '') {
                $("html, body").animate({
                    scrollTop: $(window.location.hash).offset().top - 90
                }, {
                    duration: 500,
                    easing: "swing"
                });
            }
        }, 300);
        $(document).on('click','a.smooth',function(ev) {
            if($('#sidebar').hasClass('show') && !$(this).hasClass('change-href')){
                $('#sidebar').modal('toggle');
            }
            if($(this).attr("href").substr(0, 1) == "#"){
                $("html, body").animate({
                    scrollTop: $($(this).attr("href")).offset().top - 90
                }, {
                    duration: 500,
                    easing: "swing"
                });
            }
            if($(this).hasClass('go-search-btn')){
                $('#search-text').focus();
            }
            if(!$(this).hasClass('change-href')){
                var menu =  $("a"+$(this).attr("href"));
                menu.click();
                toTarget(menu.parent().parent(),true,true);
            }
        });
        $(document).on('click','a.tab-noajax',function(ev) {
            var url = $(this).data('link');
            if(url)
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').show().attr('href', url);
            else
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').hide();
        });
        
    });
</script>

<script>
(function(){
    function getSavedMode() {
        return document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1");
    }

    function updateMode(mode) {
        var isDark = mode === "dark";
        document.body.classList.toggle("io-black-mode", isDark);
        document.body.classList.toggle("io-grey-mode", !isDark);
        document.body.classList.toggle("night", isDark);
        document.cookie = "night=" + (isDark ? "1" : "0") + ";path=/;max-age=31536000";

        var image = isDark ? "{{ $.Site.Params.images.searchImageD }}" : "{{ $.Site.Params.images.searchImageL }}";
        $("#search-bg").css("background-image", "url(" + image + ")");
        $(".switch-dark-mode").attr("data-original-title", isDark ? "日间模式" : "夜间模式");
        $(".switch-dark-mode").attr("title", isDark ? "日间模式" : "夜间模式");
        $(".switch-dark-mode .theme-mode-ico").toggleClass("icon-light", isDark).toggleClass("icon-night", !isDark);
    }

    window.switchNightMode = function() {
        var current = getSavedMode() === "1" ? "dark" : "light";
        updateMode(current === "dark" ? "light" : "dark");
    };

    var savedMode = getSavedMode();
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var configuredDark = {{ if $.Site.Params.nightMode }}true{{ else }}false{{ end }};
    var initialMode = savedMode === ""
        ? ((prefersDark || configuredDark) ? "dark" : "light")
        : (savedMode === "1" ? "dark" : "light");

    updateMode(initialMode);
})();
</script>
